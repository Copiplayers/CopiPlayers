<div class="app-shell">
  <header class="topbar">
    <a routerLink="/equipos" class="brand" aria-label="Ir al listado de equipos">
      <span class="brand-mark">CP</span>
      <span>
        <strong>CopiPlayers</strong>
        <small>Liga Endesa ACB</small>
      </span>
    </a>

    <nav class="main-nav" aria-label="Navegacion principal">
      <a routerLink="/equipos" routerLinkActive="active">Equipos</a>
      <a routerLink="/jugadores" routerLinkActive="active">Jugadores</a>
      <a routerLink="/jugadores/nuevo" routerLinkActive="active">Nuevo jugador</a>
    </nav>

  <section class="page-hero" aria-label="Resumen de la aplicacion">

    <div class="hero-actions" aria-label="Acciones rapidas">

      <a routerLink="/jugadores/nuevo" class="btn btn-secondary">Crear jugador</a>

  <main class="container" tabindex="-1">
    <router-outlet></router-outlet>
