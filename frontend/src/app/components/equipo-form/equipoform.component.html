<div class="form-page-wrapper">
  <div class="form-container">
    <h2>Nuevo Equipo</h2>

    @if (mensaje()) {
      <div [class]="error() ? 'alert alert-error' : 'alert alert-success'">
        {{ mensaje() }}
      </div>
    }

    <form [formGroup]="equipoForm" (ngSubmit)="onSubmit()" class="form">

      <div class="form-group">
        <label for="nombre">Nombre del Equipo</label>
        <input id="nombre" type="text" formControlName="nombre" placeholder="Ej: Miami Heat" class="form-control">
      </div>

      <div class="form-group">
        <label for="ciudad">Ciudad</label>
        <input id="ciudad" type="text" formControlName="ciudad" placeholder="Ej: Miami" class="form-control">
      </div>

      <div class="form-group">
        <label for="conferencia">Conferencia</label>
        <select id="conferencia" formControlName="conferencia" class="form-control">
          <option value="" disabled>Selecciona conferencia</option>
          <option value="Este">Este</option>
          <option value="Oeste">Oeste</option>
        </select>
      </div>

      <div class="form-group">
        <label for="anioFundacion">Año de Fundación</label>
        <input id="anioFundacion" type="number" formControlName="anioFundacion" placeholder="Ej: 1988" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="equipoForm.invalid">
        Crear Equipo
      </button>
    </form>
  </div>
</div>
